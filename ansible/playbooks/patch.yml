---
- name: Säkerhetspatchning av noder
  hosts: nodes
  become: yes
  tasks:
    - name: Säkerställ att dnf-plugins-core är installerat
      dnf:
        name: dnf-plugins-core
        state: present

    - name: Uppdatera alla säkerhetsrelaterade paket
      dnf:
        name: "*"
        state: latest
        security: yes
        update_cache: yes

    - name: Kontrollera om maskinen behöver startas om
      command: dnf needs-restarting -r
      register: reboot_required
      failed_when: false
      changed_when: false

    - name: Starta om servern om det behövs
      reboot:
        msg: "Startar om servern efter säkerhetsuppdateringar"
        reboot_timeout: 300
      when: reboot_required.rc == 1
